services:
  postgres:
    image: postgres:16-alpine
    container_name: sc-postgres
    environment:
      POSTGRES_USER: sc
      POSTGRES_PASSWORD: sc
      POSTGRES_DB: service_constructor
    ports:
      - "5432:5432"
    volumes:
      - sc-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sc -d service_constructor"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  sc-pgdata:
