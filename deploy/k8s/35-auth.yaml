# Auth service: gRPC (:9200) + HTTP gateway (:8090). Applies its own migrations
# at startup, talks to ledger over gRPC, and signs session JWTs with the SAME
# AUTH_JWT_SECRET as engine (so tokens minted here are accepted by engine).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: serviceconstructor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: serviceconstructor-auth:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
              name: http
            - containerPort: 9200
              name: grpc
          env:
            - name: GRPC_ADDR
              value: ":9200"
            - name: HTTP_ADDR
              value: ":8090"
            - name: LEDGER_ADDR
              value: "ledger:9100"
            - name: AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: serviceconstructor-secrets
                  key: AUTH_JWT_SECRET
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: serviceconstructor-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgres://sc:$(POSTGRES_PASSWORD)@postgres:5432/auth?sslmode=disable"
          readinessProbe:
            tcpSocket:
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8090
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: serviceconstructor
spec:
  selector:
    app: auth
  ports:
    - name: http
      port: 8090
      targetPort: 8090
    - name: grpc
      port: 9200
      targetPort: 9200
