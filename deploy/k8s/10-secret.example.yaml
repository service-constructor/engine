# Template — copy to 10-secret.yaml and fill real values, or generate with:
#   make -C engine k8s-secret
# The real 10-secret.yaml is gitignored and never committed.
apiVersion: v1
kind: Secret
metadata:
  name: serviceconstructor-secrets
  namespace: serviceconstructor
type: Opaque
stringData:
  # Postgres superuser password (used by postgres + both service DSNs).
  POSTGRES_PASSWORD: "CHANGE_ME"
  # HMAC secret for the built-in JWT authenticator (engine AUTH_MODE=jwt).
  # Use at least 32 random bytes.
  AUTH_JWT_SECRET: "CHANGE_ME_32_BYTES_MIN"
