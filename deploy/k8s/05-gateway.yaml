# gateway: the single public HTTP entry point. Verifies JWT centrally, forwards
# identity as gRPC metadata, and routes HTTP -> gRPC to engine/auth. Exposed to
# the outside (ingress + in-cluster consumers) on :8080.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: serviceconstructor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: serviceconstructor-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: HTTP_ADDR
              value: ":8080"
            - name: ENGINE_ADDR
              value: "engine:9090"
            - name: AUTH_ADDR
              value: "auth:9200"
            - name: AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: serviceconstructor-secrets
                  key: AUTH_JWT_SECRET
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: serviceconstructor
spec:
  selector:
    app: gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
