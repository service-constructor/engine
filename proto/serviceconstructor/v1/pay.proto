syntax = "proto3";

package serviceconstructor.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/service-constructor/engine/gen/serviceconstructor/v1;scv1";

// PaymentService is the universal payment entry point: it runs the saga over a
// signed quote and a device-signed consent (white paper section 7).
service PaymentService {
  // Pay verifies the quote and consent, then runs freeze -> execute ->
  // capture/release. Idempotent on the quote nonce.
  rpc Pay(PayRequest) returns (Order) {
    option (google.api.http) = {
      post: "/v1/services/pay"
      body: "*"
    };
  }

  // GetOrder returns the current state of an order.
  rpc GetOrder(GetOrderRequest) returns (Order) {
    option (google.api.http) = {
      get: "/v1/services/{service_id}/orders/{order_id}"
    };
  }

  // GetServiceInfo returns a service's public, non-sensitive info (name, origins,
  // encryption public key) so a shell can open the service. It is unscoped (any
  // authenticated user may open any service) and returns no secrets.
  rpc GetServiceInfo(GetServiceInfoRequest) returns (ServiceInfo) {
    option (google.api.http) = {
      get: "/v1/services/{service_id}/info"
    };
  }

  // ListServiceInfo returns the public catalog of ACTIVE services so a shell
  // (personal cabinet) can render its app list. Unscoped (any authenticated
  // user) and returns no secrets — only the public ServiceInfo view.
  rpc ListServiceInfo(ListServiceInfoRequest) returns (ListServiceInfoResponse) {
    option (google.api.http) = {
      get: "/v1/services"
    };
  }

  // Callback finalizes an async (PENDING) order. The provider posts the final
  // status signed with its private key; the platform verifies it against the
  // service public key. Idempotent by orderId. No user auth: authentication is
  // the signature itself.
  rpc Callback(CallbackRequest) returns (Order) {
    option (google.api.http) = {
      post: "/v1/services/callback"
      body: "*"
    };
  }
}

message GetServiceInfoRequest {
  string service_id = 1;
}

message ListServiceInfoRequest {}

message ListServiceInfoResponse {
  repeated ServiceInfo services = 1;
}

// ServiceInfo is the public view of a service — safe to expose to any shell.
message ServiceInfo {
  string service_id = 1;
  string name = 2;
  repeated string origins = 3;
  // encryption_public_key is the service's X25519 public key (base64 raw) the
  // shell uses to sealed-box encrypt the user id it hands the mini-app.
  string encryption_public_key = 4;
  // --- storefront display fields (mirror of Service catalog fields) ---
  string description = 5;
  string icon_url = 6;
  string miniapp_url = 7;
}

// Quote is the signed payment instruction issued by a service. The platform
// verifies its signature against the service public key in the registry.
message Quote {
  int32 version = 1;
  string service_id = 2;
  string user_id = 3;
  string amount = 4;
  int64 currency_id = 5;
  repeated int64 accepted_currency_ids = 6;
  string description = 7;
  // metadata is opaque to the platform; echoed to the provider on execute.
  map<string, string> metadata = 8;
  string nonce = 9;
  int64 exp = 10;
  string kid = 11;
  // Base64 signature over the canonical quote (all fields except sig).
  string sig = 12;
}

// Consent is the device-signed approval produced after the user confirms.
message Consent {
  string quote_hash = 1;
  string wallet_id = 2;
  string nonce = 3;
  int64 ts = 4;
  string device_kid = 5;
  string sig = 6;
}

message PayRequest {
  Quote quote = 1;
  // Wallet the user selected on the consent screen.
  string selected_wallet_id = 2;
  // Currency of the selected wallet (must match the quote currency and be
  // accepted by the service).
  int64 selected_wallet_currency_id = 3;
  Consent consent = 4;
}

// OrderState mirrors the saga state machine.
enum OrderState {
  ORDER_STATE_UNSPECIFIED = 0;
  ORDER_STATE_CREATED = 1;
  ORDER_STATE_FROZEN = 2;
  ORDER_STATE_EXECUTING = 3;
  ORDER_STATE_PENDING = 4;
  ORDER_STATE_EXECUTED = 5;
  ORDER_STATE_COMPLETED = 6;
  ORDER_STATE_REJECTED = 7;
  ORDER_STATE_FAILED = 8;
  ORDER_STATE_RELEASED = 9;
}

message Order {
  string order_id = 1;
  string service_id = 2;
  string user_id = 3;
  string wallet_id = 4;
  string amount = 5;
  int64 currency_id = 6;
  string fee = 7;
  string net = 8;
  string external_ref = 9;
  OrderState state = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

message GetOrderRequest {
  string service_id = 1;
  string order_id = 2;
}

// CallbackRequest is the provider's signed async finalization (white paper
// section 9). Signed with the service private key over all fields except sig.
message CallbackRequest {
  string order_id = 1;
  // status is "SUCCESS" or "FAILED".
  string status = 2;
  string external_ref = 3;
  string kid = 4;
  string sig = 5;
}
